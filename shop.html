<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shop — MANTIS Hardware</title>
  <meta name="description" content="Browse our collection of precision-engineered door hardware, pull handles, lever handles, and smart locks.">
  <style>
    /* Critical styles */
    body {
      background-color: #ffffff;
      color: #000000;
      margin: 0;
      overflow-x: hidden;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }
  </style>
</head>

<body>
  <!-- Global Header -->
  <header class="global-header">
    <a href="/" class="logo"><img style="height: 80px;" src="/Screenshot_2026-06-17_at_1.32.38_PM-removebg-preview.png" alt=""></a>
    <nav class="nav-links">
      <a href="/" class="nav-item">Home</a>
      <div class="nav-item-dropdown">
        <a href="/shop.html" class="nav-item active">Shop ▾</a>
        <div class="dropdown-menu">
          <a href="/shop.html" class="dropdown-item">All Products</a>
          <a href="/shop.html?category=pull-handles" class="dropdown-item">Pull Handles</a>
          <a href="/shop.html?category=lever-handles" class="dropdown-item">Lever Handles</a>
          <a href="/shop.html?category=smart-locks" class="dropdown-item">Smart Locks</a>
          <a href="/shop.html?category=door-hinges" class="dropdown-item">Door Hinges</a>
          <a href="/shop.html?category=door-closers" class="dropdown-item">Door Closers</a>
          <a href="/shop.html?category=accessories" class="dropdown-item">Accessories</a>
        </div>
      </div>
      <a href="/index.html#about" class="nav-item">About</a>
      <a href="/index.html#contact" class="nav-item">Contact</a>
    </nav>
    <a href="/index.html#contact" class="header-cta">Inquire</a>
  </header>

  <!-- Shop Content -->
  <main class="shop-page">
    <div class="shop-hero">
      <h1 class="shop-title">Hardware <span style="color: #f39a35;">Collection</span> </h1>
      <p class="shop-subtitle">Precision-engineered fittings for modern architecture</p>
    </div>

    <div class="shop-container">
      <!-- Sidebar Filters -->
      <aside class="shop-sidebar">
        <div class="sidebar-section">
          <h3 class="sidebar-title">Categories</h3>
          <ul class="category-list" id="shop-categories-list">
            <!-- Dynamic Categories -->
          </ul>
        </div>

        <div class="sidebar-section">
          <h3 class="sidebar-title">
            <span>Filters</span>
            <button id="clear-filters-btn" class="clear-btn">Clear</button>
          </h3>

          <!-- Material -->
          <div class="filter-group">
            <span class="filter-label">Material</span>
            <div class="filter-options" id="filter-materials"></div>
          </div>

          <!-- Finish -->
          <div class="filter-group">
            <span class="filter-label">Finish</span>
            <div class="filter-options" id="filter-finishes"></div>
          </div>

          <!-- Color -->
          <div class="filter-group">
            <span class="filter-label">Color</span>
            <div class="filter-options color-swatches" id="filter-colors"></div>
          </div>
        </div>
      </aside>

      <!-- Products Grid -->
      <div class="shop-main">
        <div class="shop-controls">
          <div class="search-box">
            <input type="text" id="shop-search" placeholder="Search products..." />
          </div>
          <div class="sort-box">
            <select id="shop-sort">
              <option value="name-asc">Name: A-Z</option>
              <option value="name-desc">Name: Z-A</option>
              <option value="category">Category</option>
            </select>
          </div>
        </div>

        <div class="shop-results">
          <span id="shop-results-count">Loading products...</span>
        </div>

        <div class="products-grid" id="shop-products-grid">
          <!-- Dynamic Products -->
        </div>
      </div>
    </div>
  </main>

  <script type="module" src="/src/shop.js">
</body>

</html>
