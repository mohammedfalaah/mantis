<div style="max-width:1400px;margin:50px auto;padding:0 40px;">

  <div style="display:grid;grid-template-columns:1.2fr 1fr;gap:60px;align-items:start;">

    <!-- Image Section -->
    <div>
      <img id="drawer-image"
           src=""
           alt="Product"
           style="width:100%;border-radius:12px;display:block;">
    </div>

    <!-- Details Section -->
    <div>

      <span id="drawer-category"
            style="color:#f39a35;font-size:13px;letter-spacing:2px;text-transform:uppercase;">
        Category
      </span>

      <h1 id="drawer-title"
          style="font-size:42px;margin:15px 0;font-weight:700;">
        Product Name
      </h1>

      <p id="drawer-subcategory"
         style="font-size:18px;color:#666;margin-bottom:25px;">
        Subcategory
      </p>

      <p id="drawer-desc"
         style="line-height:1.8;color:#555;margin-bottom:30px;">
        Description
      </p>

      <div style="background:#fff;border-radius:12px;padding:25px;box-shadow:0 5px 20px rgba(0,0,0,.08);">

        <h3 style="margin-top:0;">Product Details</h3>

        <p><strong>Material:</strong>
          <span id="drawer-material">-</span>
        </p>

        <p><strong>Finishes:</strong>
          <span id="drawer-finishes">-</span>
        </p>

        <p><strong>Colors:</strong>
          <span id="drawer-colors">-</span>
        </p>

        <p><strong>Sizes:</strong>
          <span id="drawer-sizes">-</span>
        </p>

      </div>

      <button  id="inquire-btn"
        style="width:100%;margin-top:25px;padding:16px;border:none;border-radius:8px;background:#f39a35;color:#fff;font-size:16px;cursor:pointer;" id="inquire-btn">
        Inquire About This Product
      </button>

    </div>

  </div>

</div>

<script type="module" src="/src/product.js"></script>
